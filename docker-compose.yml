services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: techlog-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: techlog
      CLICKHOUSE_USER: techlog
      CLICKHOUSE_PASSWORD: techlog
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  mongo:
    image: mongo:7
    container_name: techlog-hyperdx-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  hyperdx:
    image: docker.hyperdx.io/hyperdx/hyperdx
    container_name: techlog-hyperdx
    restart: unless-stopped
    depends_on:
      - clickhouse
      - mongo
    ports:
      - "8088:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/hyperdx
      HYPERDX_API_KEY: techlog-local-dev-key
      FRONTEND_URL: ${HYPERDX_FRONTEND_URL:-http://10.0.10.24:8088}
      HYPERDX_LOG_LEVEL: info

  techlog-loader:
    build: .
    container_name: techlog-loader
    restart: unless-stopped
    depends_on:
      - clickhouse
    ports:
      - "18081:8081"
    environment:
      TECHLOG_UPLOAD_TOKEN: ${TECHLOG_UPLOAD_TOKEN:?set TECHLOG_UPLOAD_TOKEN in .env}
    command:
      - watch
      - --path
      - /inbox
      - --http-listen
      - 0.0.0.0:8081
      - --host
      - clickhouse
      - --port
      - "8123"
      - --database
      - techlog
      - --user
      - techlog
      - --password
      - techlog
    volumes:
      - ${TECHLOG_INBOX:?set TECHLOG_INBOX in .env}:/inbox

volumes:
  clickhouse-data:
  mongo-data:
